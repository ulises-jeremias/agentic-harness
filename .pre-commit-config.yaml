repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "^docs/.*\\.md$"
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]
        exclude: "^knowledge/"

  - repo: local
    hooks:
      - id: validate-context
        name: Validate context schemas (packs, jobs, personas)
        language: python
        additional_dependencies: [jsonschema, PyYAML]
        entry: bash scripts/validate-context.sh
        pass_filenames: false
        files: "^(packs/|templates/jobs/|personas/|schemas/)"

  # shellcheck disabled - bin/* are Python scripts, not shell scripts
  # - repo: https://github.com/shellcheck-py/shellcheck-py
