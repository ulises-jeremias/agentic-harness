name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # This repo is not a Python package and intentionally does not carry
          # requirements.txt/pyproject.toml. `cache: pip` fails hard when no
          # dependency manifest is present, so we keep setup-python simple here.

      - name: Install pre-commit
        run: pip install --upgrade pre-commit

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Show pre-commit version
        run: pre-commit --version && markdownlint --version

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  validate-context:
    name: Validate context schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema PyYAML

      - name: Validate packs, job templates, and personas
        run: bash scripts/validate-context.sh
