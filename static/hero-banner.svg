<svg width="1440" height="420" viewBox="0 0 1440 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">agentic-harness</title>
  <desc id="desc">A futuristic AI harness banner with memory streams, context nodes, and orchestration layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="0.5" stop-color="#071026"/>
      <stop offset="1" stop-color="#12091f"/>
    </linearGradient>
    <radialGradient id="auraA" cx="70%" cy="20%" r="70%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.48"/>
      <stop offset="0.34" stop-color="#4f46e5" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraB" cx="20%" cy="70%" r="60%">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.38"/>
      <stop offset="0.44" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#a5b4fc" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1440" height="420" rx="34" fill="url(#auraA)"/>
  <rect width="1440" height="420" rx="34" fill="url(#auraB)"/>
  <rect width="1440" height="420" rx="34" fill="url(#grid)"/>

  <g transform="translate(92 72)">
    <rect x="0" y="0" width="150" height="38" rx="19" fill="#111827" fill-opacity="0.78" stroke="#8b5cf6" stroke-opacity="0.48"/>
    <circle cx="24" cy="19" r="5" fill="#06b6d4"/>
    <text x="42" y="24" fill="#eef2ff" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" letter-spacing="1.6">L2 RUNTIME</text>

    <text x="0" y="106" fill="#ffffff" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="70" font-weight="900" letter-spacing="-3.1">agentic-harness</text>
    <text x="2" y="150" fill="#c7d2fe" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="500">Persistent memory, context, and autonomous loops for AI coding agents.</text>
    <text x="2" y="184" fill="#67e8f9" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" letter-spacing="0.4">remember · route · orchestrate · improve · repeat</text>

    <g transform="translate(0 234)">
      <rect x="0" y="0" width="176" height="72" rx="22" fill="url(#card)" stroke="#06b6d4" stroke-opacity="0.36"/>
      <text x="22" y="30" fill="#cffafe" font-family="Inter, ui-sans-serif, sans-serif" font-size="15" font-weight="800">memory layer</text>
      <text x="22" y="52" fill="#67e8f9" font-family="Inter, ui-sans-serif, sans-serif" font-size="13">knowledge survives</text>

      <rect x="194" y="0" width="176" height="72" rx="22" fill="url(#card)" stroke="#8b5cf6" stroke-opacity="0.38"/>
      <text x="216" y="30" fill="#ede9fe" font-family="Inter, ui-sans-serif, sans-serif" font-size="15" font-weight="800">loop engine</text>
      <text x="216" y="52" fill="#c4b5fd" font-family="Inter, ui-sans-serif, sans-serif" font-size="13">tasks keep moving</text>

      <rect x="388" y="0" width="176" height="72" rx="22" fill="url(#card)" stroke="#f472b6" stroke-opacity="0.38"/>
      <text x="410" y="30" fill="#fce7f3" font-family="Inter, ui-sans-serif, sans-serif" font-size="15" font-weight="800">persona guardrails</text>
      <text x="410" y="52" fill="#f9a8d4" font-family="Inter, ui-sans-serif, sans-serif" font-size="13">safe work modes</text>
    </g>
  </g>

  <g transform="translate(965 50)" opacity="0.98">
    <rect x="0" y="22" width="330" height="248" rx="34" fill="#0f172a" fill-opacity="0.48" stroke="#c4b5fd" stroke-opacity="0.18"/>
    <path d="M68 72 H260 M68 122 H260 M68 172 H260 M68 222 H260" stroke="#a5b4fc" stroke-opacity="0.16" stroke-width="1"/>
    <path d="M86 50 C156 94 176 26 248 76" fill="none" stroke="url(#stroke)" stroke-width="2" stroke-opacity="0.84" filter="url(#softGlow)"/>
    <path d="M86 126 C154 174 180 86 248 134" fill="none" stroke="#06b6d4" stroke-width="1.8" stroke-opacity="0.64"/>
    <path d="M86 202 C154 250 180 162 248 210" fill="none" stroke="#f472b6" stroke-width="1.8" stroke-opacity="0.64"/>
    <circle cx="86" cy="50" r="9" fill="#06b6d4" filter="url(#softGlow)"/>
    <circle cx="248" cy="76" r="9" fill="#8b5cf6" filter="url(#softGlow)"/>
    <circle cx="86" cy="126" r="8" fill="#22d3ee" filter="url(#softGlow)"/>
    <circle cx="248" cy="134" r="8" fill="#a78bfa" filter="url(#softGlow)"/>
    <circle cx="86" cy="202" r="8" fill="#f472b6" filter="url(#softGlow)"/>
    <circle cx="248" cy="210" r="8" fill="#67e8f9" filter="url(#softGlow)"/>
    <rect x="96" y="286" width="138" height="36" rx="18" fill="#111827" stroke="#06b6d4" stroke-opacity="0.42"/>
    <text x="165" y="309" text-anchor="middle" fill="#e0f2fe" font-family="Inter, ui-sans-serif, sans-serif" font-size="13" font-weight="800" letter-spacing="1.2">AGENT LOOP</text>
  </g>

  <path d="M0 416 H1440" stroke="url(#stroke)" stroke-width="4"/>
</svg>
